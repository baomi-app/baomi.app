name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-workers-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy production Worker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build OpenNext bundle
        run: npx opennextjs-cloudflare build
        env:
          GITHUB_TOKEN: ${{ secrets.APP_CONTENT_GITHUB_TOKEN }}

      - name: Populate remote incremental cache
        run: |
          if ! npx opennextjs-cloudflare populateCache remote; then
            echo "::warning::OpenNext could not pre-populate the remote R2 incremental cache. Continuing with deployment; the Worker can repopulate cache entries at runtime."
          fi
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.APP_CONTENT_GITHUB_TOKEN }}

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
