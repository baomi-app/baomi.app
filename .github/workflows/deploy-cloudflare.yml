name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-workers-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy production Worker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build OpenNext bundle
        run: npx opennextjs-cloudflare build
        env:
          GITHUB_TOKEN: ${{ secrets.APP_CONTENT_GITHUB_TOKEN }}

      - name: Deploy to Cloudflare Workers
        run: |
          for attempt in 1 2 3; do
            if npx opennextjs-cloudflare deploy; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi

            sleep_seconds=$((attempt * 30))
            echo "Deploy failed; retrying in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
          done
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.APP_CONTENT_GITHUB_TOKEN }}
