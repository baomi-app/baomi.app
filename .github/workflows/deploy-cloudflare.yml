name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-workers-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy production Worker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build OpenNext bundle
        run: npx opennextjs-cloudflare build
        env:
          GITHUB_TOKEN: ${{ secrets.APP_CONTENT_GITHUB_TOKEN }}

      - name: Verify R2 cache bucket access
        run: |
          if ! npx wrangler r2 bucket info baomi-app-opennext-cache; then
            echo "::error::CLOUDFLARE_API_TOKEN cannot access the R2 bucket baomi-app-opennext-cache. Regenerate the token with Account > Workers R2 Storage Read and Edit permissions for account $CLOUDFLARE_ACCOUNT_ID."
            exit 1
          fi
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Populate remote incremental cache
        run: npx opennextjs-cloudflare populateCache remote
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.APP_CONTENT_GITHUB_TOKEN }}

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy --no-bundle
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          OPEN_NEXT_DEPLOY: "true"
